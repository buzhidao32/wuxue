name: Capacitor Mobile Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  APP_DIR: wuxue-app
  NODE_VERSION: "20"
  JAVA_VERSION: "21"

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
      - name: Sync Capacitor Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android artifacts
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug assembleRelease bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          if-no-files-found: error
          path: |
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/*.apk
            ${{ env.APP_DIR }}/android/app/build/outputs/apk/release/*.apk
            ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/*.aab

  ios:
    name: Build iOS
    runs-on: macos-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Create iOS platform if missing
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: pod install --project-directory=ios/App

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          if-no-files-found: error
          path: |
            ${{ env.APP_DIR }}/ios/build/Build/Products/Debug-iphonesimulator/App.app
            ${{ env.APP_DIR }}/ios/App


